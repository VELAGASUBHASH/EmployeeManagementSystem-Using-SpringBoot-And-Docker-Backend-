services:

  db:
    image: postgres:15
    container_name: ems-postgres
    restart: always
    environment:
      POSTGRES_DB: ems
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ems_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: ems-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ems
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
    depends_on:
      - db

volumes:
  ems_data: